          - text: ", and"
          - link "Spotify" [ref=e57] [cursor=pointer]:
            - /url: https://engineering.atspotify.com/2025/11/spotifys-background-coding-agent-part-1
          - text: ". Our old processes can't absorb these changes anymore. Now, every engineering leader is asking the same question:"
          - strong [ref=e58]: how do we get from today's delivery process to a self-driving codebase?
