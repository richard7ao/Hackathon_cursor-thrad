            - heading "Remove the human from the invocation loop" [level=4] [ref=e412]
          - paragraph [ref=e413]: "If every agent run starts with a developer typing a prompt, you haven't automated the workflow — just the work. Triggers connect agents to the events that matter: schedules, webhooks, system signals. Each pattern maps to a different scope and cadence."
        - generic [ref=e415]:
