            - heading "Scheduled agents" [level=4] [ref=e418]
          - paragraph [ref=e419]: Triggered on a timer. Predictable, bounded, high-volume — dependency updates, lint sweeps, coverage enforcement.
        - generic [ref=e424]:
          - generic [ref=e425]:
            - generic [ref=e426]: ⚡︎
            - heading "Event-driven agents" [level=4] [ref=e427]
          - paragraph [ref=e428]: Triggered by system events — a PR opened, a CVE published, an alert fired. Reactive, concurrent, always listening.
        - generic [ref=e433]:
