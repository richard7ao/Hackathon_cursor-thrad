            - img [ref=e454]
            - heading "Mobile" [level=4] [ref=e456]
          - paragraph [ref=e457]: Trigger one, or many agents direct from your phone, or iMessage. One text, and a fleet fans out. The new TDD, Taxi Driven Development.
      - generic [ref=e464]:
        - generic [ref=e466]:
          - generic [ref=e467]: Fleet Coordination
          - heading "One intent, every repo" [level=4] [ref=e468]
        - paragraph [ref=e469]: Updating one repository is a coding agent task. Updating 500 is a fleet task. The same sandbox, replicated across every repository that needs the change — parallel provisioning, progress tracking, aggregated results. This is where individual productivity becomes organizational throughput.
