          - generic [ref=e253]:
            - text: Sandbox as tool
            - generic [ref=e254]:
              - img [ref=e256]:
                - generic [ref=e258]: E2B
              - img [ref=e260]
              - img [ref=e264]
          - paragraph [ref=e267]:
            - text: The agent has a full development environment. A VM running a dev container with your codebase, test suite, databases, and internal network access.
            - text: This is the closest to how a human developer works. Every enterprise that has shared their agent architecture publicly including Stripe, Ramp, and Spotify chose this pattern.
          - paragraph [ref=e268]:
            - text: The agent runs on a server or locally. When it needs to execute code, it calls a separate remote sandbox via API. The sandbox runs the code and returns the result. This keeps secrets and execution somewhat isolated, but the agent can only execute code and not fully develop.
            - text: Best suited for companies building agent products than organizations improving their own engineering workflows.
