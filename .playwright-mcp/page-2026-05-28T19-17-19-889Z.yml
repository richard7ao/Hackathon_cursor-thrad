        - heading "Background agents work across the entire SDLC." [level=1] [ref=e51]
        - paragraph [ref=e52]:
          - text: Software delivery was designed around constraints of humans at keyboards. Now, agents run autonomously across thousands of repos in the background. This trend is already in motion at companies like
          - link "Stripe" [ref=e53] [cursor=pointer]:
            - /url: https://stripe.dev/blog/minions-stripes-one-shot-end-to-end-coding-agents
          - text: ","
          - link "Ramp" [ref=e54] [cursor=pointer]:
