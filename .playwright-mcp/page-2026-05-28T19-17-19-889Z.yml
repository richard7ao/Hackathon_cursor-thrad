            - generic [ref=e339]: Governance
            - heading "Enforced at runtime, not by prompt" [level=4] [ref=e340]
          - paragraph [ref=e341]:
            - text: Agents are actors in your system. They need the same controls as human contributors — identity, permissions, audit trails.
            - text: "The difference: governance enforced by a system prompt (\"please don't delete files\") is a suggestion. Governance enforced at the execution layer — deny lists, scoped credentials, deterministic command blocking — is actual governance. Without it, security teams veto autonomous agents entirely. And they're right to."
        - 'link "Read: How Claude Code escapes its own denylist and sandbox by Leonardo Di Donato, Agent Security Lead at Ona" [ref=e345] [cursor=pointer]':
