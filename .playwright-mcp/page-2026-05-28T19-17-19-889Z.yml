        - heading "Individual speed ≠ organizational velocity." [level=2] [ref=e119]
        - paragraph [ref=e120]:
          - text: You rolled out coding agents. Engineers are faster. PRs flood in.
          - text: Yet, cycle time doesn't budge. DORA metrics are flat. The backlog grows.
          - text: Because gains are compounding with the individual, not the organization. The longer you invest in coding agents without addressing the system around it, the deeper you entrench.
          - strong [ref=e121]: This is the false summit.
