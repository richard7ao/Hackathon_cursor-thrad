          - img [ref=e98]
          - img [ref=e101]
      - paragraph [ref=e103]: Autocomplete became coding agents. Coding agents became three coding agents running in parallel on your laptop. Engineers reached for worktrees, more and more terminals, spare Mac Minis. Anything to run more agents.
      - paragraph [ref=e104]: But localhost wasn't built for this. Agents fight over machine state, secrets become exposed, and everything stops when the machine sleeps.
      - paragraph [ref=e105]:
        - text: That works for indie-hackers, but is
        - strong [ref=e106]: untenable for professional engineering.
        - text: We must de-couple engineers from workstations. Agents need to run in the background, securely, and at scale.
      - 'link "Read: The Last Year of Localhost by Johannes Landgraf, co-founder of Ona" [ref=e110] [cursor=pointer]':
