        - heading "Establish agent primitives" [level=2] [ref=e209]
        - paragraph [ref=e210]: Autonomous agents need infrastructure that doesn't exist on your laptop. The building blocks below are what separate a demo from a deployment — sandboxed execution, governance, connectivity to your internal systems, trigger automation, and fleet coordination. Each one unlocks the next.
      - generic [ref=e214]:
        - generic [ref=e216]:
          - generic [ref=e217]: Development Environment
          - heading "The agent needs a computer" [level=4] [ref=e218]
        - paragraph [ref=e219]:
          - text: Agents running in the background need their own execution environment with a full toolchain, ability to run tests and access via secrets to systems.
          - text: Environments should be isolated, and reproducible with close parity to production systems to allow fleets of agents. Everything else builds on top of this.
      - generic [ref=e238]:
        - generic [ref=e240]:
          - generic [ref=e241]: Pattern 1
          - generic [ref=e242]: Pattern 2
          - generic [ref=e243]:
            - text: Agent has dev environment
            - generic [ref=e244]:
