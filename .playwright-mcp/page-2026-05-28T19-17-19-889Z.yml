            - heading "Behind your firewall" [level=4] [ref=e358]
          - paragraph [ref=e359]: A sandbox that can't reach your internal systems is a toy. Agents need to assume IAM roles, query database replicas, hit internal APIs, and pull from private registries — all from inside your network. Context and connectivity turn isolated execution into real work.
