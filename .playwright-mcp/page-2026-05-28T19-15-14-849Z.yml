        - generic [ref=e837]:
          - generic [ref=e838]: The self-driving codebase
          - generic [ref=e839]: Autonomous agents across the SDLC
          - paragraph [ref=e840]: "Coding agents made individuals faster. Background agents make codebases self-driving — autonomous, event-triggered, running across the SDLC without a human at the keyboard. Companies like Stripe, Ramp, and Uber are all asking the same question: how do we get there?"
          - img [ref=e843]:
            - generic [ref=e846]: CODE
            - generic [ref=e847]: REVIEW
            - generic [ref=e848]: TEST
        - generic [ref=e870]:
          - generic [ref=e871]: The false summit
          - generic [ref=e872]: Our systems are bottlenecked by localhost
          - paragraph [ref=e873]: Autocomplete became coding agents. Coding agents became three coding agents running in parallel on your laptop. But localhost wasn’t built for this. Agents fight over machine state, secrets become exposed, and everything stops when the machine sleeps.
        - generic [ref=e877]:
          - generic [ref=e878]: Background agent primitives
          - generic [ref=e879]: Agents that run in the background
          - paragraph [ref=e880]: Agents need to run in the background, securely, and at scale. Sandboxed execution, governance, context and connectivity, and fleet coordination — one task across many repositories, each agent working independently.
        - generic [ref=e884]:
          - generic [ref=e885]: The software factory
          - generic [ref=e886]: Scale your software factory
          - paragraph [ref=e887]: "Today your engineers stand at every station: writing, reviewing, testing. Background agents change the operating model. The factory runs, but your engineers move on the loop instead of in it."
